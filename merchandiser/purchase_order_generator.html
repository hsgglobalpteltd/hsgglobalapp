<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Order Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <h1 class="text-xl font-bold mb-1">Purchase Order Request</h1>
        <p class="text-gray-500 text-sm mb-6">HSG Global Pte Ltd</p>

        <div class="mb-4">
            <label class="block text-xs font-semibold text-gray-700 mb-1 uppercase">Retailer</label>
            <select id="retailerSelect" onchange="onRetailerChange()" class="w-full p-2.5 border rounded-lg bg-gray-50"></select>
        </div>

        <div class="mb-4">
            <label class="block text-xs font-semibold text-gray-700 mb-1 uppercase">Store</label>
            <select id="storeSelect" class="w-full p-2.5 border rounded-lg bg-gray-50"></select>
        </div>
        
        <div class="border-t pt-4 mt-2">
            <label class="block text-xs font-semibold text-gray-700 mb-1 uppercase">Add Products</label>
            <select id="productSelect" class="w-full p-2.5 border rounded-lg text-sm mb-2"></select>
            <div class="flex gap-2 mb-2">
                <input type="number" id="pcsInput" placeholder="Pcs" class="w-1/2 p-2.5 border rounded-lg">
                <input type="number" id="ctnInput" placeholder="Ctn" class="w-1/2 p-2.5 border rounded-lg">
            </div>
            <button onclick="addProduct()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700">Add to Order</button>
        </div>

        <button onclick="generatePDF()" class="w-full bg-green-600 text-white p-3 rounded-xl mt-6 font-bold hover:bg-green-700">Generate Request PO</button>

        <table class="w-full mt-6 text-sm border-collapse">
            <tbody id="cartBody"></tbody>
        </table>
    </div>

    <script>
        const DB_URLS = {
            retailer: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpLnulzvd5tnGT1vo9Ys3ucQIDi8VcpTxbjIyP2Paz3QOFYLw8Yytk1W-X6yYkrJzjTnsf3dsxo3DA/pub?gid=1081696917&single=true&output=csv',
            store: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpLnulzvd5tnGT1vo9Ys3ucQIDi8VcpTxbjIyP2Paz3QOFYLw8Yytk1W-X6yYkrJzjTnsf3dsxo3DA/pub?gid=1954354905&single=true&output=csv',
            sku: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpLnulzvd5tnGT1vo9Ys3ucQIDi8VcpTxbjIyP2Paz3QOFYLw8Yytk1W-X6yYkrJzjTnsf3dsxo3DA/pub?gid=894002124&single=true&output=csv'
        };

        let cart = [];
        let dataCache = { retailers: [], stores: [], skus: [] };

        async function fetchWithCache(key, url) {
            const cached = localStorage.getItem(key);
            const now = new Date().getTime();
            if (cached) {
                const data = JSON.parse(cached);
                if (now - data.timestamp < 86400000) return data.items;
            }
            const response = await fetch(url);
            const text = await response.text();
            return new Promise((resolve) => {
                Papa.parse(text, { header: true, skipEmptyLines: true, complete: (results) => {
                    localStorage.setItem(key, JSON.stringify({ timestamp: now, items: results.data }));
                    resolve(results.data);
                }});
            });
        }

        async function init() {
            const [r, s, sku] = await Promise.all([
                fetchWithCache('retailers', DB_URLS.retailer),
                fetchWithCache('stores', DB_URLS.store),
                fetchWithCache('skus', DB_URLS.sku)
            ]);
            dataCache.retailers = r; dataCache.stores = s; dataCache.skus = sku;
            const rSelect = document.getElementById('retailerSelect');
            rSelect.innerHTML = '<option value="">Select a Retailer</option>' + r.map(i => `<option value="${i.ID}">${i['Display Name']}</option>`).join('');
        }

        function onRetailerChange() {
            const rId = document.getElementById('retailerSelect').value;
            const sSelect = document.getElementById('storeSelect');
            const pSelect = document.getElementById('productSelect');
            sSelect.innerHTML = '<option value="">Select a Store</option>' + dataCache.stores.filter(s => s['Retailers ID'] == rId).map(s => `<option value="${s.ID}">${s['Display Name']}</option>`).join('');
            pSelect.innerHTML = '<option value="">Select a Product</option>' + dataCache.skus.filter(s => s['Retailer ID'] == rId).map(s => `<option value="${s['SKU Number']}">${s['SKU Name']}</option>`).join('');
        }

        function addProduct() {
            const p = document.getElementById('productSelect');
            const pcs = document.getElementById('pcsInput').value || 0;
            const ctn = document.getElementById('ctnInput').value || 0;
            if(!p.value || (!pcs && !ctn)) return;
            const item = { id: Date.now(), name: p.options[p.selectedIndex].text, sku: p.value, pcs, ctn };
            cart.push(item);
            renderCart();
        }

        function removeProduct(id) {
            cart = cart.filter(i => i.id !== id);
            renderCart();
        }

        function renderCart() {
            const body = document.getElementById('cartBody');
            body.innerHTML = cart.map(item => `
                <tr class="border-b">
                    <td class="p-2 text-xs">${item.name}</td>
                    <td class="p-2 text-right font-bold text-xs">${item.pcs}pcs (${item.ctn}ctn)</td>
                    <td class="p-2 text-right">
                        <button onclick="removeProduct(${item.id})" class="text-red-500 hover:text-red-700">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: [100, 297] });
            const store = dataCache.stores.find(s => s.ID == document.getElementById('storeSelect').value);
            
            doc.setFont("helvetica", "bold");
            doc.text('Purchase Order Request', 50, 10, { align: 'center' });
            doc.setFontSize(8);
            doc.text('HSG Global Pte Ltd', 50, 15, { align: 'center' });
            
            if (store) {
                doc.setFontSize(10);
                doc.text(store['Display Name'], 10, 25);
                doc.setFontSize(8);
                doc.setFont("helvetica", "normal");
                doc.text(store['Address'] || '', 10, 29);
            }
            
            let y = 45;
            cart.forEach(item => {
                // Large SKU, Small Product Name
                doc.setFont("helvetica", "bold");
                doc.setFontSize(14);
                doc.text(item.sku, 10, y);
                doc.setFontSize(12);
                doc.text(`${item.pcs}pcs (${item.ctn}ctn)`, 90, y, { align: 'right' });
                
                y += 5;
                doc.setFont("helvetica", "normal");
                doc.setFontSize(8);
                doc.text(item.name, 10, y);
                
                y += 3;
                const canvas = document.createElement('canvas');
                JsBarcode(canvas, item.sku, { format: "CODE39", width: 2, height: 20, displayValue: false, margin: 0 });
                doc.addImage(canvas.toDataURL("image/png"), 'PNG', 10, y, 80, 15);
                y += 22;
            });
            doc.save('PO_Request.pdf');
        }
        window.onload = init;
    </script>
</body>
</html>
